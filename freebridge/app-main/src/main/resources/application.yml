spring:
  profiles:
    include: secret
  application:
    name: freebridge
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  data:
    mongodb:
      database: freebridge
      authentication-database: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connection-timeout: 5000
          timeout: 5000
          write-timeout: 5000

portone:
  api-secret: ${PORTONE_API_SECRET:test_secret}
  channel-key: ${PORTONE_CHANNEL_KEY:test_channel_key}
  subscription:
    plan:
      pro: ${PORTONE_SUBSCRIPTION_PLAN_PRO:9900}
      prime: ${PORTONE_SUBSCRIPTION_PLAN_PRIME:19900}

fallguys:
  redis:
  ai:
    python-url: ${PYTHON_AI_URL:http://localhost:8000}
  s3:
    bucket: ${S3_BUCKET:freebr-s3}
    region: ${S3_REGION:ap-northeast-2}
    presigned-url-expiration-minutes: ${S3_PRESIGNED_URL_EXPIRATION_MINUTES:60}

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}
  refresh-token:
    hmac-secret: ${REFRESH_TOKEN_HMAC_SECRET:${JWT_SECRET:}}

server:
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,300ms,500ms,1s,3s